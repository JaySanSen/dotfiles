format = """
$time\
$directory\
$git_branch\
$git_status\
$line_break\
$character"""

# $git_commit\
# $cmd_duration\

# Show only essential symbols in the directory
[directory]
#style = "cyan bold"
style = "cyan"
truncation_length = 1
truncation_symbol = ""
truncate_to_repo = false
#style = "white bg:blue bold"

[git_branch]
style = "purple"
#style = "white bg:purple"
# symbol = " "
# symbol = " "
symbol = "󰜡 "
#format = "on [\\[$branch\\]]($style) "
format = "on [\\[$branch\\]]($style) "

[git_status]
style = "purple"
ahead = "${count}"
diverged = "󰦻 ${ahead_count} ${behind_count}"
behind = "${count}"
untracked = "u${count}"
modified = "m${count}"
staged = "s${count}"
renamed = "r${count}"
deleted = "d${count}"
stashed = "st${count}"


# [git_commit]
# commit_hash_length = 8
# tag_symbol = " "

# Change the prompt character based on shell status
[character]
# success_symbol = "[❯](bold green)"
success_symbol = "[](bold green)"
# error_symbol = "[❯](bold red)"
error_symbol = "[](bold red)"


# Show 12 hour local time
[time]
disabled = false
use_12hr = true
# #time_format = '%I:%M:%S %p'
time_format = '%I:%M %p'
style = "yellow"
format = '[$time]($style) '



# Shows the time taken to complete the command
